services:
  work-share-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: work-share-server
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  work-share-client:
    image: node:20-alpine
    container_name: work-share-client
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      - VITE_PROXY_TARGET=http://work-share-server:3000
    volumes:
      - ./server/client:/app
      - /app/node_modules
    depends_on:
      work-share-server:
        condition: service_healthy
    restart: unless-stopped
