<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Three people icons arranged in triangle -->
  <!-- Top person -->
  <g>
    <circle cx="12" cy="5.5" r="2" stroke="currentColor" stroke-width="1.5" fill="none"/>
    <path d="M 8 12 Q 8 9 12 9 Q 16 9 16 12" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Bottom left person -->
  <g>
    <circle cx="5.5" cy="16" r="1.8" stroke="currentColor" stroke-width="1.5" fill="none"/>
    <path d="M 2 21 Q 2 18.5 5.5 18.5 Q 9 18.5 9 21" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Bottom right person -->
  <g>
    <circle cx="18.5" cy="16" r="1.8" stroke="currentColor" stroke-width="1.5" fill="none"/>
    <path d="M 15 21 Q 15 18.5 18.5 18.5 Q 22 18.5 22 21" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Connection lines -->
  <g stroke="currentColor" stroke-width="1.2" stroke-linecap="round" opacity="0.6">
    <line x1="11" y1="8" x2="7" y2="14.5" />
    <line x1="13" y1="8" x2="17" y2="14.5" />
    <line x1="7" y1="18" x2="17" y2="18" />
  </g>
</svg>
